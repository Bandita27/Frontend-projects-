<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Basic Website</title>
    <meta name="description" content="Get in touch with Bandita via this contact form.">
</head>

<body>
    <header>
        <h1>My Website</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contact Me</h2>
        <p>Have a question or want to work together? Fill out the form below.</p>

        <form action="#" method="post">
            <div>
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Bandita. All rights reserved.</p>
    </footer>
</body>

</html>
